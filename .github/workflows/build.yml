name: Build & Push Docker Image
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER2 }}
          password: ${{ secrets.DOCKER_TOKEN2 }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: docker.io/pantasyongbayan/freenet:latest
          platforms: linux/amd64
